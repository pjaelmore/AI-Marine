# Continuous Integration
#
# TDD §12.3.1 specifies the full CI matrix (analyze, format, unit tests with
# 75% coverage rising to 85%, integration tests on emulator, calibration
# suite hard-fail, debug APK build, iOS build smoke). This Phase 1 starter
# runs the subset that is meaningful against the current codebase.
#
# Deferred to later phases (each gets added when the work it gates exists):
#   - Coverage threshold gate: enforced once Phase 5 lands the calculator
#     and Phase 6 lands widget tests; structural coverage is too low to
#     gate meaningfully today.
#   - integration_test/ runs on Android emulator: empty until Phase 7 E2E.
#   - test/calibration/ hard-fail: empty until the first tuple from Phase 5.
#   - flutter build ios --no-codesign: needs a macOS runner; added in
#     Phase 8 alongside TestFlight wiring.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref so we don't queue stale builds when
# pushing rapid-fire commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Mirror .fvmrc — bump together when the local Flutter pin moves.
  FLUTTER_VERSION: '3.22.0'
  JAVA_VERSION: '17'

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Static analysis
        run: flutter analyze --fatal-infos

      - name: Unit tests with coverage
        run: flutter test --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore

  build-android-debug:
    name: Build Android (debug smoke)
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug
